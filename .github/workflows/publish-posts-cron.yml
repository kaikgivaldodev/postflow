name: Publish scheduled posts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call publish-posts cron endpoint
        run: |
          curl --fail --silent --show-error \
            --max-time 55 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            https://postflowinsta.vercel.app/api/cron/publish-posts
